<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Utama - Latihan USBD PAI & BP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJpZCIsCiAgIm5hbWUiOiAiVHJ5b3V0IFVTQkQgUEFJIiwKICAic2hvcnRfbmFtZSI6ICJVU0JEIFBBSSIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiOiAiIzBGMUE1RTkiCn0=">
    <style>
        :root { 
            --blue-main: #0ea5e9;    
            --blue-dark: #0284c7;    
            --blue-light: #e0f2fe;   
            --blue-hover: #bae6fd;   
            --blue-deep: #0369a1; /* Warna biru gelap solid */
            --text-main: #1e293b; 
        }

        /* Kunci Layar Penuh Tanpa Scroll */
        html, body {
            margin: 0; 
            padding: 0;
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--blue-deep); /* Background disamakan dengan proktor & ujian */
            color: #ffffff; /* Teks diubah menjadi putih agar kontras */
            display: flex; 
            align-items: center; 
            justify-content: center;
            user-select: none; 
            -webkit-user-select: none;
        }

        .container { 
            width: 90%; 
            height: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4vh 0 2vh 0;
            box-sizing: border-box;
        }

        .branding {
            text-align: center;
            flex-shrink: 0;
            margin-top: 2vh;
        }

        .branding h1 { 
            font-size: clamp(2.5rem, 8vh, 5.5rem); 
            font-weight: 800; 
            color: #ffffff; /* Ubah warna menjadi putih */
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: -1.5px;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.2);
        }

        .branding p { 
            font-size: clamp(0.95rem, 2.5vh, 1.4rem); 
            color: #e0f2fe; /* Ubah warna agar kontras dengan bg gelap */
            font-weight: 700; 
            margin: 1.5vh 0 0 0; 
            letter-spacing: 2px; 
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: center;
        }

        .choice-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 4vw; 
            width: 100%;
            max-width: 1000px; 
        }

        .choice-card {
            background: #ffffff; 
            border: 2px solid transparent; /* Disesuaikan untuk background gelap */
            border-radius: 35px;
            padding: 7vh 3vw; 
            text-decoration: none; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; 
            flex-direction: column; 
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Container Ikon Diperbesar */
        .icon-box {
            width: clamp(90px, 15vh, 140px);
            height: clamp(90px, 15vh, 140px);
            background: var(--blue-light);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3vh;
            transition: all 0.3s ease;
        }

        /* Ikon SVG Diperbesar */
        .icon-box svg {
            width: 55%; 
            height: 55%;
            fill: none;
            stroke: var(--blue-main);
            stroke-width: 2.2; 
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        .choice-card:hover { 
            transform: translateY(-12px); 
            border-color: var(--blue-main); 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3); 
        }

        .choice-card:hover .icon-box {
            background: var(--blue-main);
            transform: scale(1.1) rotate(-5deg);
        }

        .choice-card:hover .icon-box svg {
            stroke: #ffffff;
        }

        .choice-card h2 { 
            font-size: clamp(1.6rem, 4vh, 2.5rem); 
            font-weight: 800; 
            color: var(--text-main); 
            margin: 0; 
        }

        .choice-card p { 
            color: #64748b; 
            font-weight: 600; 
            margin-top: 1.5vh; 
            font-size: clamp(1rem, 2.2vh, 1.2rem);
        }

        .footer { 
            font-size: clamp(0.8rem, 1.8vh, 1rem); 
            font-weight: 600; 
            color: #bae6fd; /* Disamakan warnanya dengan footer halaman lain */
            letter-spacing: 1px;
            flex-shrink: 0;
            padding-top: 2vh;
        }

        /* Responsif HP */
        @media (max-width: 600px) {
            .choice-grid { grid-template-columns: 1fr; gap: 2.5vh; max-width: 90%; }
            .choice-card { padding: 4vh 2vw; border-radius: 25px; }
            .icon-box { width: clamp(75px, 11vh, 100px); height: clamp(75px, 11vh, 100px); margin-bottom: 2vh; border-radius: 22px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <header class="branding">
            <h1>GERBANG PORTAL</h1>
            <p>LATIHAN USBD PAI & BP • KAB. BANTUL 2025/2026</p>
        </header>

        <main class="main-content">
            <div class="choice-grid">
                <a href="ujian.html" class="choice-card">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
                        </svg>
                    </div>
                    <h2>PORTAL SISWA</h2>
                    <p>Masuk Halaman Ujian</p>
                </a>

                <a href="proktor.html" class="choice-card">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            <path d="M9 12l2 2 4-4"></path>
                        </svg>
                    </div>
                    <h2>PORTAL PROKTOR</h2>
                    <p>Masuk Halaman Proktor</p>
                </a>
            </div>
        </main>

        <footer class="footer">
            &copy; 2026 KKG PAI Kapanewon Srandakan
        </footer>
    </div>

    <script>
        document.onkeydown = (e) => {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) return false;
            if(e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83)) return false;
        };
    </script>
</body>
</html>
