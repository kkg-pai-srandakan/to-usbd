<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Utama - Latihan USBD PAI & BP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJpZCIsCiAgIm5hbWUiOiAiVHJ5b3V0IFVTQkQgUEFJIiwKICAic2hvcnRfbmFtZSI6ICJVU0JEIFBBSSIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiOiAiIzBGMUE1RTkiCn0=">
    <style>
        :root { 
            --blue-main: #0ea5e9;    
            --blue-dark: #0284c7;    
            --blue-light: #e0f2fe;   
            --blue-hover: #bae6fd;   
            --text-main: #1e293b; 
        }

        /* Kunci Layar Penuh Tanpa Scroll */
        html, body {
            margin: 0; 
            padding: 0;
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #ffffff; 
            background-image: radial-gradient(circle at top right, #f0f9ff 0%, transparent 40%), 
                              radial-gradient(circle at bottom left, #e0f2fe 0%, transparent 40%);
            color: var(--text-main);
            display: flex; 
            align-items: center; 
            justify-content: center;
            user-select: none; 
            -webkit-user-select: none;
        }

        .container { 
            width: 90%; 
            height: 100%;
            max-width: 1000px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Menyebarkan konten secara merata */
            align-items: center;
            padding: 4vh 0 2vh 0; /* Menggunakan vh agar dinamis */
            box-sizing: border-box;
        }

        .branding {
            text-align: center;
            flex-shrink: 0;
            margin-top: 2vh;
        }

        .branding h1 { 
            font-size: clamp(2rem, 6vh, 4rem); 
            font-weight: 800; 
            color: var(--blue-dark); 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: -1px;
            text-shadow: 2px 4px 10px rgba(14, 165, 233, 0.15);
        }

        .branding p { 
            font-size: clamp(0.85rem, 2vh, 1.2rem); 
            color: var(--blue-main); 
            font-weight: 700; 
            margin: 1vh 0 0 0; 
            letter-spacing: 1.5px; 
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: center;
        }

        .choice-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 3vw; 
            width: 100%;
            max-width: 850px;
        }

        .choice-card {
            background: #ffffff; 
            border: 2px solid var(--blue-light); 
            border-radius: 30px;
            padding: 5vh 2vw; 
            text-decoration: none; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; 
            flex-direction: column; 
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.05);
        }

        /* Container Ikon Modern */
        .icon-box {
            width: clamp(70px, 12vh, 110px);
            height: clamp(70px, 12vh, 110px);
            background: var(--blue-light);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5vh;
            transition: all 0.3s ease;
        }

        /* Ikon Menggunakan Stroke (Garis) agar elegan */
        .icon-box svg {
            width: 50%;
            height: 50%;
            fill: none;
            stroke: var(--blue-main);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        .choice-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--blue-main); 
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.15); 
        }

        .choice-card:hover .icon-box {
            background: var(--blue-main);
            transform: scale(1.1) rotate(-5deg);
        }

        .choice-card:hover .icon-box svg {
            stroke: #ffffff;
        }

        .choice-card h2 { 
            font-size: clamp(1.4rem, 3.5vh, 2rem); 
            font-weight: 800; 
            color: var(--blue-dark); 
            margin: 0; 
        }

        .choice-card p { 
            color: #64748b; 
            font-weight: 600; 
            margin-top: 1vh; 
            font-size: clamp(0.9rem, 2vh, 1.1rem);
        }

        .footer { 
            font-size: clamp(0.75rem, 1.5vh, 0.9rem); 
            font-weight: 600; 
            color: #94a3b8; 
            letter-spacing: 1px;
            flex-shrink: 0;
            padding-top: 2vh;
        }

        /* Responsif HP */
        @media (max-width: 600px) {
            .choice-grid { grid-template-columns: 1fr; gap: 2vh; }
            .choice-card { padding: 3vh 2vw; border-radius: 20px; }
            .icon-box { width: clamp(60px, 9vh, 80px); height: clamp(60px, 9vh, 80px); margin-bottom: 1.5vh; border-radius: 18px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <header class="branding">
            <h1>GERBANG PORTAL</h1>
            <p>LATIHAN USBD PAI & BP • KAB. BANTUL 2025/2026</p>
        </header>

        <main class="main-content">
            <div class="choice-grid">
                <a href="ujian.html" class="choice-card">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
                        </svg>
                    </div>
                    <h2>PORTAL SISWA</h2>
                    <p>Masuk Halaman Ujian</p>
                </a>

                <a href="proktor.html" class="choice-card">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            <path d="M9 12l2 2 4-4"></path>
                        </svg>
                    </div>
                    <h2>PORTAL PROKTOR</h2>
                    <p>Masuk Halaman Proktor</p>
                </a>
            </div>
        </main>

        <footer class="footer">
            &copy; 2026 KKG PAI Kapanewon Srandakan
        </footer>
    </div>

    <script>
        document.onkeydown = (e) => {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) return false;
            if(e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83)) return false;
        };
    </script>
</body>
</html>
