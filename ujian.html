<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Siswa - Latihan USBD PAI & BP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-main: #0ea5e9;
            --blue-dark: #0284c7;
            --blue-light: #e0f2fe;
            --text-main: #1e293b;
        }

        /* Mencegah scroll di seluruh body */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #ffffff;
            background-image: radial-gradient(circle at top right, #f0f9ff 0%, transparent 40%), 
                              radial-gradient(circle at bottom left, #e0f2fe 0%, transparent 40%);
            color: var(--text-main);
            user-select: none;
            -webkit-user-select: none;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px 5vw;
            box-sizing: border-box;
        }

        /* Header lebih ringkas */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            flex-shrink: 0;
        }

        .branding h1 {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 800;
            margin: 0;
            color: var(--blue-dark);
            text-transform: uppercase;
        }

        .branding p {
            margin: 0;
            color: var(--blue-main);
            font-weight: 700;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
        }

        .clock-container {
            background: var(--blue-light);
            padding: 8px 18px;
            border-radius: 15px;
            border: 2px solid var(--blue-main);
        }

        #clock {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--blue-dark);
        }

        /* Main Content mengambil sisa ruang */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Pusatkan konten secara vertikal */
            gap: 10px;
            min-height: 0; /* Penting agar flex child bisa mengecil */
        }

        .server-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .label-divider {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--blue-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .label-divider::after {
            content: '';
            height: 1px;
            background: var(--blue-light);
            flex: 1;
        }

        /* Grid lebih rapat */
        .siswa-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 kolom agar pas di satu baris */
            gap: 12px;
        }

        .card-school {
            background: var(--blue-light);
            border-radius: 18px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .icon-box svg {
            width: 22px;
            height: 22px;
            fill: var(--blue-main);
        }

        .card-school strong {
            color: var(--blue-dark);
            font-size: 0.75rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-school:hover {
            transform: translateY(-5px);
            background: #ffffff;
            border-color: var(--blue-main);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.1);
        }

        .footer {
            padding: 10px 0;
            text-align: center;
            color: #94a3b8;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        /* Fullscreen Iframe */
        #iframe-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99999;
            background: #fff;
        }

        #exam-frame { width: 100%; height: 100%; border: none; }

        /* Penyesuaian Mobile (Potret) */
        @media (max-width: 768px) {
            .siswa-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            /* Jika di mobile terlalu penuh, izinkan scroll internal hanya di area kartu */
            .main-content {
                overflow-y: auto;
                justify-content: flex-start;
                padding-right: 5px;
            }
            .card-school { padding: 12px 8px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="wrapper">
    <header class="header-container">
        <div class="branding">
            <h1>PORTAL SISWA</h1>
            <p>LATIHAN USBD PAI & BP • KAB. BANTUL</p>
        </div>
        <div class="clock-container">
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main class="main-content">
        <div class="server-section">
            <div class="label-divider">SERVER 1</div>
            <div class="siswa-grid" id="grid-server-1"></div>
        </div>

        <div class="server-section">
            <div class="label-divider">SERVER 2</div>
            <div class="siswa-grid" id="grid-server-2"></div>
        </div>
    </main>

    <footer class="footer">&copy; 2026 KKG PAI Kabupaten Bantul (Srandakan)</footer>
</div>

<div id="iframe-container"><iframe id="exam-frame" src=""></iframe></div>

<script>
    const server1ID = "AKfycbzIiMVLECqO_CVj1ii17ZFizmL4RQYx3zdMlWELw8BO0SmRCmg-PYfkViW0wSXaXqg";
    const server2ID = "AKfycbzNXRvgW1Q52VnefA4XWqanSx4H-3tKUCJAl7B79VTt0j3Q_KlDJcCI7uID08Q4UyxR";
    
    const schools1 = ["SD Negeri 1 Godegan", "SD Negeri 1 Srandakan", "SD Negeri Koripan", "SD Negeri Talkondo", "SD Negeri Mangiran"];
    const schools2 = ["SD IT Al-Aysar", "SD Negeri Proketen", "SD Negeri 2 Srandakan", "SD Negeri Krajan", "SD Negeri Gunungsaren"];

    const getUrl = (id) => `https://script.google.com/a/macros/sd1godegan.sch.id/s/${id}/exec`;

    const cardTemplate = (name, url) => `
        <a href="${url}" onclick="bukaUjian(event, this.href)" class="card-school">
            <div class="icon-box">
                <svg viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M13,9V3.5L18.5,9H13M16,11V13H8V11H16M16,15V17H8V15H16Z"/></svg>
            </div>
            <strong>${name}</strong>
        </a>
    `;

    document.getElementById('grid-server-1').innerHTML = schools1.map(s => cardTemplate(s, getUrl(server1ID))).join('');
    document.getElementById('grid-server-2').innerHTML = schools2.map(s => cardTemplate(s, getUrl(server2ID))).join('');

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000); updateClock();

    function bukaUjian(event, url) {
        event.preventDefault();
        const container = document.getElementById('iframe-container');
        const frame = document.getElementById('exam-frame');
        frame.src = url;
        container.style.display = 'block';

        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    }

    document.onkeydown = (e) => {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && [85, 83].includes(e.keyCode))) return false;
    };
</script>

</body>
</html>
