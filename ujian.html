<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Siswa - Latihan USBD PAI & BP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* PALET OCEANIC BLUE (SOFT) */
            --deep-twilight: #03045e;
            --french-blue: #023e8a;
            --bright-teal-blue: #0077b6;
            --blue-green: #0096c7;
            --turquoise-surf: #00b4d8;
            --sky-aqua: #48cae4;
            --frosted-blue: #90e0ef;
            --frosted-blue-2: #ade8f4;
            --light-cyan: #caf0f8;
        }

        /* Mencegah scroll di seluruh body */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--deep-twilight);
            color: var(--light-cyan);
            user-select: none;
            -webkit-user-select: none;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 2vh 4vw;
            box-sizing: border-box;
        }

        /* Header Modern */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5vh 0;
            flex-shrink: 0;
        }

        .branding h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 800;
            margin: 0;
            color: var(--light-cyan);
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .branding p {
            margin: 5px 0 0;
            color: var(--frosted-blue);
            font-weight: 700;
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            letter-spacing: 1px;
        }

        /* Desain Jam Digital */
        .clock-container {
            background: rgba(144, 224, 239, 0.1); /* Frosted blue transparan */
            padding: 1vh 2vw;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(144, 224, 239, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        #clock {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 800;
            color: var(--light-cyan);
            letter-spacing: 2px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3vh;
            min-height: 0;
            padding: 2vh 0;
        }

        .server-section {
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
        }

        .label-divider {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--light-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0.9;
        }

        .label-divider::after {
            content: '';
            height: 2px;
            /* Gradien biru muda untuk garis server */
            background: linear-gradient(to right, rgba(202, 240, 248, 0.3), transparent);
            flex: 1;
            border-radius: 2px;
        }

        /* Grid Fleksibel */
        .siswa-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vh 1vw;
        }

        /* Desain Card Modern Menyamai Halaman Utama */
        .card-school {
            background-color: var(--frosted-blue); 
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2vh 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .icon-box {
            width: clamp(45px, 6vh, 60px);
            height: clamp(45px, 6vh, 60px);
            background-color: rgba(2, 62, 138, 0.1); /* Latar ikon biru transparan */
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2vh;
            transition: all 0.3s ease;
        }

        .icon-box svg {
            width: 70%;
            height: 70%;
            fill: none;
            stroke: var(--french-blue); /* Ikon biru tua menyala */
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        .card-school strong {
            color: var(--deep-twilight); /* Teks kartu gelap agar kontras dengan biru muda */
            font-size: clamp(0.75rem, 1.5vw, 0.85rem);
            font-weight: 800;
            text-align: center;
            line-height: 1.3;
        }

        /* Efek Hover */
        .card-school:hover {
            transform: translateY(-5px);
            background-color: var(--sky-aqua);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .card-school:hover .icon-box {
            background-color: var(--french-blue);
            transform: scale(1.1);
        }

        .card-school:hover .icon-box svg {
            stroke: var(--light-cyan);
        }

        .footer {
            padding: 1.5vh 0;
            text-align: center;
            color: var(--frosted-blue-2);
            font-weight: 600;
            font-size: 0.8rem;
            flex-shrink: 0;
            opacity: 0.6;
        }

        #iframe-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99999;
            background: #fff;
        }

        #exam-frame { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) {
            .siswa-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5vh;
            }
            .header-container { flex-direction: column; text-align: center; gap: 15px; }
            .branding h1 { font-size: 1.8rem; }
            .main-content { overflow-y: auto; justify-content: flex-start; padding: 10px 5px; }
            .card-school { padding: 1.5vh 8px; border-radius: 16px; }
            .label-divider::after { display: none; }
            .label-divider { justify-content: center; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="wrapper">
    <header class="header-container">
        <div class="branding">
            <h1>PORTAL SISWA</h1>
            <p>LATIHAN USBD PAI & BP • TINGKAT KABUPATEN BANTUL</p>
        </div>
        <div class="clock-container">
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main class="main-content">
        <div class="server-section">
            <div class="label-divider">SERVER 1</div>
            <div class="siswa-grid" id="grid-server-1"></div>
        </div>

        <div class="server-section">
            <div class="label-divider">SERVER 2</div>
            <div class="siswa-grid" id="grid-server-2"></div>
        </div>
    </main>

    <footer class="footer">&copy; 2026 KKG PAI Kapanewon Srandakan</footer>
</div>

<div id="iframe-container"><iframe id="exam-frame" src=""></iframe></div>

<script>
    const server1ID = "AKfycbzIiMVLECqO_CVj1ii17ZFizmL4RQYx3zdMlWELw8BO0SmRCmg-PYfkViW0wSXaXqg";
    const server2ID = "AKfycbzNXRvgW1Q52VnefA4XWqanSx4H-3tKUCJAl7B79VTt0j3Q_KlDJcCI7uID08Q4UyxR";
    
    const schools1 = ["SD Negeri 1 Godegan", "SD Negeri 1 Srandakan", "SD Negeri Koripan", "SD Negeri Talkondo", "SD Negeri Mangiran"];
    const schools2 = ["SD IT Al-Aysar", "SD Negeri Proketen", "SD Negeri 2 Srandakan", "SD Negeri Krajan", "SD Negeri Gunungsaren"];

    const getUrl = (id) => `https://script.google.com/a/macros/sd1godegan.sch.id/s/${id}/exec`;

    const cardTemplate = (name, url) => `
        <a href="${url}" onclick="bukaUjian(event, this.href)" class="card-school">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="14" rx="2" ry="2"></rect>
                    <path d="M8 21h8"></path>
                    <path d="M12 17v4"></path>
                    <path d="M9 10l2 2 4-4"></path>
                </svg>
            </div>
            <strong>${name}</strong>
        </a>
    `;

    document.getElementById('grid-server-1').innerHTML = schools1.map(s => cardTemplate(s, getUrl(server1ID))).join('');
    document.getElementById('grid-server-2').innerHTML = schools2.map(s => cardTemplate(s, getUrl(server2ID))).join('');

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000); updateClock();

    function bukaUjian(event, url) {
        event.preventDefault();
        const container = document.getElementById('iframe-container');
        const frame = document.getElementById('exam-frame');
        
        frame.src = url;
        container.style.display = 'block';

        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    }

    document.onkeydown = (e) => {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) || (e.ctrlKey && [85, 83].includes(e.keyCode))) return false;
    };
</script>

</body>
</html>
