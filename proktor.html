<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Proktor - Latihan USBD PAI & BP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-light: #38bdf8;
            --blue-main: #0ea5e9;
            --blue-dark: #0284c7;
            --blue-deep: #0369a1;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
        }

        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--blue-light) 0%, var(--blue-dark) 100%);
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden; /* Mengunci agar tidak bisa di-scroll */
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 2vh 5vw; /* Menggunakan vh agar menyesuaikan tinggi layar */
            box-sizing: border-box;
        }

        .branding {
            padding: 2vh 0;
            text-align: center;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.15);
        }

        .branding h1 {
            /* Teks PORTAL PROKTOR Diperbesar */
            font-size: clamp(2.5rem, 6vh, 4rem); 
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .branding p {
            margin: 1vh 0 0;
            font-weight: 600;
            color: #e0f2fe;
            font-size: clamp(0.8rem, 1.8vh, 1rem);
            letter-spacing: 2px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 1vh 0;
        }

        .label-proktor {
            font-size: clamp(0.8rem, 1.8vh, 1rem);
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 3vh;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        .label-proktor::after, .label-proktor::before {
            content: '';
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            flex: 1;
        }

        .proktor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2vh 1.5vw;
            width: 100%;
            max-width: 1100px;
        }

        .card-school {
            background: var(--card-bg);
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2.5vh 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.2);
        }

        .icon-flat {
            /* Ikon Komputer Diperbesar */
            width: clamp(60px, 8vh, 85px); 
            height: clamp(60px, 8vh, 85px);
            margin-bottom: 1.5vh;
            background: #f0f9ff;
            padding: 2vh; /* Padding disesuaikan agar proporsional */
            border-radius: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .icon-flat svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--blue-main);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        .card-school:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(2, 132, 199, 0.4);
        }

        .card-school:hover .icon-flat {
            background: var(--blue-main);
            transform: scale(1.1);
        }

        .card-school:hover .icon-flat svg {
            stroke: #ffffff;
        }

        .card-school strong { 
            color: var(--text-dark); 
            font-size: clamp(0.85rem, 1.8vh, 1rem); 
            font-weight: 800; 
            line-height: 1.3; 
        }

        .footer {
            padding: 2vh 0;
            text-align: center;
            color: #bae6fd;
            font-weight: 600;
            font-size: clamp(0.75rem, 1.5vh, 0.85rem);
        }

        #iframe-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10000;
            background: white;
        }

        #exam-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Penyesuaian khusus jika dibuka di HP */
        @media (max-width: 480px) {
            .proktor-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 1.5vh 2vw;
            }
            .card-school { padding: 1.5vh 5px; border-radius: 15px; }
            .icon-flat { 
                width: clamp(50px, 7vh, 70px); 
                height: clamp(50px, 7vh, 70px); 
                padding: 1.5vh; 
                margin-bottom: 1vh; 
                border-radius: 12px; 
            }
            .branding h1 { font-size: clamp(1.8rem, 5vh, 2.5rem); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="wrapper" id="page-wrapper">
    <header class="branding">
        <h1>PORTAL PROKTOR</h1>
        <p>LATIHAN USBD PAI & BP • TINGKAT KABUPATEN BANTUL 2025/2026</p>
    </header>

    <main class="main-content">
        <div class="label-proktor">Pilih Ruang Proktor Sekolah</div>
        
        <div class="proktor-grid">
            <script>
                const schools = [
                    "SD Negeri 1 Godegan", "SD Negeri Proketen", "SD Negeri Talkondo", 
                    "SD Negeri 1 Srandakan", "SD Negeri 2 Srandakan", "SD Negeri Mangiran", 
                    "SD Negeri Gunungsaren", "SD Negeri Koripan", "SD Negeri Krajan", "SD IT Al-Aysar"
                ];
                
                const urlBase = "https://script.google.com/a/macros/sd1godegan.sch.id/s/AKfycbxX5Ql92_iKuLhewmWgjhdE3EVdT2GG4TtDHCZqf4CPzL6UdYWemerXYBaZhHvtTu6o/exec?p=proktor";

                document.write(schools.map(school => `
                    <a href="${urlBase}" onclick="bukaIframe(event, this.href)" class="card-school">
                        <div class="icon-flat">
                            <svg viewBox="0 0 24 24">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </div>
                        <strong>${school}</strong>
                    </a>
                `).join(''));
            </script>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 KKG PAI Kapanewon Srandakan
    </footer>
</div>

<div id="iframe-container">
    <iframe id="exam-frame" src=""></iframe>
</div>

<script>
    function bukaIframe(event, url) {
        event.preventDefault(); 
        const container = document.getElementById('iframe-container');
        const frame = document.getElementById('exam-frame');

        frame.src = url;
        container.style.display = 'block';
    }

    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false;
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) return false;
        if(e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83)) return false;
    };
</script>

</body>
</html>
