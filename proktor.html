<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Proktor - Latihan USBD PAI & BP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-light: #38bdf8;
            --blue-main: #0ea5e9;
            --blue-dark: #0284c7;
            --blue-deep: #0369a1;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--blue-light) 0%, var(--blue-dark) 100%);
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px 5vw;
            box-sizing: border-box;
        }

        .branding {
            padding: 30px 0;
            text-align: center;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.15);
        }

        .branding h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .branding p {
            margin: 5px 0 0;
            font-weight: 600;
            color: #e0f2fe;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            letter-spacing: 2px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 0;
        }

        .label-proktor {
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        .label-proktor::after, .label-proktor::before {
            content: '';
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            flex: 1;
        }

        .proktor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card-school {
            background: var(--card-bg);
            border-radius: 24px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 35px 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.2);
        }

        /* Ikon Flat SVG */
        .icon-flat {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            background: #f0f9ff;
            padding: 15px;
            border-radius: 18px;
            transition: all 0.3s ease;
        }

        .icon-flat svg {
            width: 100%;
            height: 100%;
            fill: var(--blue-main);
        }

        .card-school:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(2, 132, 199, 0.4);
        }

        .card-school:hover .icon-flat {
            background: var(--blue-main);
            transform: scale(1.1);
        }

        .card-school:hover .icon-flat svg {
            fill: #ffffff;
        }

        .card-school strong { 
            color: var(--text-dark); 
            font-size: 0.95rem; 
            font-weight: 800; 
            line-height: 1.4; 
        }

        .footer {
            padding: 30px 0;
            text-align: center;
            color: #bae6fd;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Iframe & Fullscreen Container */
        #iframe-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10000;
            background: white;
        }

        #exam-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Tombol Tutup saat Fullscreen */
        #close-btn {
            position: fixed;
            top: 10px;
            right: 20px;
            z-index: 10001;
            background: rgba(0,0,0,0.2);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            display: none;
        }

        #close-btn:hover { background: rgba(255,0,0,0.7); }

        @media (max-width: 480px) {
            .proktor-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
            .card-school { padding: 25px 10px; }
            .icon-flat { width: 45px; height: 45px; padding: 10px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="wrapper" id="page-wrapper">
    <header class="branding">
        <h1>PORTAL PROKTOR</h1>
        <p>LATIHAN USBD PAI & BP • KAB. BANTUL 2025/2026</p>
    </header>

    <main class="main-content">
        <div class="label-proktor">Pilih Ruang Proktor Sekolah</div>
        
        <div class="proktor-grid">
            <script>
                const schools = [
                    "SD Negeri 1 Godegan", "SD Negeri Proketen", "SD Negeri Talkondo", 
                    "SD Negeri 1 Srandakan", "SD Negeri 2 Srandakan", "SD Negeri Mangiran", 
                    "SD Negeri Gunungsaren", "SD Negeri Koripan", "SD Negeri Krajan", "SD IT Al-Aysar"
                ];
                
                const urlBase = "https://script.google.com/a/macros/sd1godegan.sch.id/s/AKfycbxX5Ql92_iKuLhewmWgjhdE3EVdT2GG4TtDHCZqf4CPzL6UdYWemerXYBaZhHvtTu6o/exec?p=proktor";

                document.write(schools.map(school => `
                    <a href="${urlBase}" onclick="bukaIframe(event, this.href)" class="card-school">
                        <div class="icon-flat">
                            <svg viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
                        </div>
                        <strong>${school}</strong>
                    </a>
                `).join(''));
            </script>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 KKG PAI Kabupaten Bantul (Kapanewon Srandakan)
    </footer>
</div>

<div id="iframe-container">
    <button id="close-btn" onclick="tutupIframe()">Keluar Fullscreen</button>
    <iframe id="exam-frame" src=""></iframe>
</div>

<script>
    function bukaIframe(event, url) {
        event.preventDefault();
        const container = document.getElementById('iframe-container');
        const frame = document.getElementById('exam-frame');
        const closeBtn = document.getElementById('close-btn');

        frame.src = url;
        container.style.display = 'block';
        closeBtn.style.display = 'block';

        // Fungsi Otomatis Fullscreen
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE11 */
            elem.msRequestFullscreen();
        }
    }

    function tutupIframe() {
        document.getElementById('iframe-container').style.display = 'none';
        document.getElementById('close-btn').style.display = 'none';
        document.getElementById('exam-frame').src = "";
        
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
    }

    // Keamanan Dasar
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false;
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) return false;
        if(e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83)) return false;
    };
</script>

</body>
</html>
